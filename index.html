<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ΕΙΚΟΝΕΣ ΟΡΘΟΔΟΞΙΑΣ</title>

<style>

:root{
--bg:#0f0f0f;
--card:#1a1a1a;
--accent:#4da3ff;
}

body{
margin:0;
background:var(--bg);
font-family:system-ui,-apple-system,Segoe UI,Roboto;
color:white;
}

header{
text-align:center;
padding:28px 20px 10px;
max-width:900px;
margin:auto;
}

header h1{
margin:0;
font-size:28px;
font-weight:600;
}

header h1 a{
color:white;
text-decoration:none;
}

header h1 a:hover{
color:var(--accent);
}

.description{
margin-top:10px;
font-size:15px;
opacity:.8;
line-height:1.5;
}

/* gallery grid */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:16px;
padding:20px;
max-width:1400px;
margin:auto;
}

/* image card */

.card{
background:var(--card);
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 20px rgba(0,0,0,0.5);
transition:transform .2s, box-shadow .2s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
display:block;
cursor:pointer;
}

/* pagination */

.pagination{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
padding:30px;
}

button{
background:var(--card);
border:none;
color:white;
padding:12px 20px;
font-size:15px;
border-radius:10px;
cursor:pointer;
transition:background .2s;
}

button:hover{
background:#2a2a2a;
}

.page-info{
opacity:.8;
}

/* viewer */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.viewer img{
max-width:95%;
max-height:95%;
border-radius:10px;
}

.viewer.show{
display:flex;
}

</style>
</head>

<body>

<header>
<h1><a href="index.html">ΕΙΚΟΝΕΣ ΟΡΘΟΔΟΞΙΑΣ</a></h1>
<div class="description">
Εκκλησιαστικές/Βυζαντινές Εικόνες
</div>
</header>

<div class="gallery" id="gallery"></div>

<div class="pagination">
<button id="prev">◀ Προηγούμενη</button>
<span class="page-info" id="pageInfo"></span>
<button id="next">Επόμενη ▶</button>
</div>

<div class="viewer" id="viewer">
<img id="viewerImg">
</div>

<script>

/* generate image list 0001 → 0138 */
const images = []

for (let i = 1; i <= 138; i++) {
  const num = String(i).padStart(4, "0")
  images.push(num + ".png")
}

/* 🔀 shuffle function */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1))
    ;[array[i], array[j]] = [array[j], array[i]]
  }
}

/* shuffle images once on load */
shuffle(images)

const pageSize = 15
let page = 0

const gallery = document.getElementById("gallery")
const pageInfo = document.getElementById("pageInfo")

function render(){

gallery.innerHTML=""

const start = page * pageSize
const end = start + pageSize

images.slice(start,end).forEach((src,i)=>{

const card=document.createElement("div")
card.className="card"

const img=document.createElement("img")
img.src="images/" + src
img.loading="lazy"

img.onclick=()=>openViewer(start+i)

card.appendChild(img)
gallery.appendChild(card)

})

pageInfo.textContent=`Σελίδα ${page+1} / ${Math.ceil(images.length/pageSize)}`

}

document.getElementById("next").onclick=()=>{

if((page+1)*pageSize<images.length){
page++
render()
window.scrollTo(0,0)
}

}

document.getElementById("prev").onclick=()=>{

if(page>0){
page--
render()
window.scrollTo(0,0)
}

}

/* viewer */

const viewer=document.getElementById("viewer")
const viewerImg=document.getElementById("viewerImg")

let currentIndex=0

function openViewer(index){

currentIndex=index
viewerImg.src="images/" + images[index]
viewer.classList.add("show")

}

viewer.onclick=()=>{
viewer.classList.remove("show")
}

/* keyboard navigation */

document.addEventListener("keydown",(e)=>{

if(!viewer.classList.contains("show")) return

if(e.key==="ArrowRight"){
currentIndex=(currentIndex+1)%images.length
viewerImg.src="images/" + images[currentIndex]
}

if(e.key==="ArrowLeft"){
currentIndex=(currentIndex-1+images.length)%images.length
viewerImg.src="images/" + images[currentIndex]
}

if(e.key==="Escape"){
viewer.classList.remove("show")
}

})

render()

</script>

</body>
</html>
